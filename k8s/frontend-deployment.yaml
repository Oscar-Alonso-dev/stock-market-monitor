apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-frontend
  template:
    metadata:
      labels:
        app: stock-frontend
    spec:
      containers:
      - name: frontend
        image: stock-frontend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: stock-frontend
spec:
  type: NodePort
  selector:
    app: stock-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080