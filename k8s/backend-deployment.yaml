apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-backend
  template:
    metadata:
      labels:
        app: stock-backend
    spec:
      containers:
      - name: backend
        image: stock-monitor:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: FINNHUB_API_KEY
          valueFrom:
            secretKeyRef:
              name: stock-secrets
              key: finnhub-api-key
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: stock-backend
spec:
  selector:
    app: stock-backend
  ports:
  - port: 8000
    targetPort: 8000